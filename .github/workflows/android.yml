name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 1. Decode Key agar bisa dipakai GitHub
      - name: Decode Keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > ryuki-senpai-key.jks

      # 2. Build versi Release (Sudah otomatis pakai signingConfig yang kita buat di build.gradle)
      - name: Build with Gradle
        run: ./gradlew clean assembleRelease
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 3. Upload file APK hasil sign
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyTrialApp-Release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          
